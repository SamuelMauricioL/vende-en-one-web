<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vende en One · Live Controller</title>
  <style>
    :root {
      --bg: #0b0f1a;
      --panel: #121826;
      --panel-2: #1a2236;
      --border: #26324b;
      --text: #e7ecf5;
      --muted: #8a93a8;
      --brand: #fe2c55;
      --brand-2: #25f4ee;
      --ok: #34d399;
      --warn: #fbbf24;
      --err: #f87171;
      --radius: 14px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, "Cascadia Mono", monospace;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background:
        radial-gradient(1200px 600px at 100% -10%, rgba(37,244,238,0.08), transparent 60%),
        radial-gradient(1000px 500px at -10% 110%, rgba(254,44,85,0.08), transparent 60%),
        var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      padding: 32px 16px 64px;
    }
    .wrap { max-width: 880px; margin: 0 auto; }
    header { margin-bottom: 28px; }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo .mark {
      width: 40px; height: 40px; border-radius: 12px;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      display: grid; place-items: center; font-weight: 800; color: #0b0f1a;
      box-shadow: 0 8px 24px rgba(254,44,85,0.35);
    }
    .logo h1 { font-size: 20px; margin: 0; letter-spacing: -0.01em; }
    .logo p { margin: 2px 0 0; color: var(--muted); font-size: 13px; }
    .card {
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: 0 18px 60px rgba(0,0,0,0.35);
    }
    form.start {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: end;
    }
    label { font-size: 12px; color: var(--muted); margin-bottom: 6px; display: block; }
    input[type="text"] {
      width: 100%;
      background: rgba(0,0,0,0.25);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 10px;
      padding: 14px 14px;
      font-size: 16px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    input[type="text"]:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(254,44,85,0.18);
    }
    .btn-row { display: flex; gap: 10px; }
    button {
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px 20px;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: transform .05s, filter .15s, background .15s;
      white-space: nowrap;
    }
    button:hover { filter: brightness(1.08); }
    button:active { transform: translateY(1px); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.secondary { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); }
    button.secondary:hover { background: #212b44; }
    .hint { color: var(--muted); font-size: 12px; margin-top: 10px; }

    .section { margin-top: 28px; }
    .section h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin: 0 0 12px; }

    .status {
      display: flex; align-items: center; gap: 10px;
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      font-family: var(--mono);
      font-size: 13px;
      min-height: 48px;
      color: var(--muted);
      word-break: break-all;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--muted); flex: 0 0 auto; }
    .dot.ok { background: var(--ok); box-shadow: 0 0 12px var(--ok); }
    .dot.warn { background: var(--warn); box-shadow: 0 0 12px var(--warn); }
    .dot.err { background: var(--err); box-shadow: 0 0 12px var(--err); }

    .lives { display: grid; gap: 10px; }
    .live-item {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
    }
    .live-item .who { display: flex; align-items: center; gap: 12px; }
    .avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      display: grid; place-items: center; font-weight: 700; color: #0b0f1a; text-transform: uppercase;
    }
    .who .name { font-weight: 600; }
    .who .sub { color: var(--muted); font-size: 12px; font-family: var(--mono); }
    .empty { color: var(--muted); font-size: 13px; padding: 6px 2px; }

    .toast {
      position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%);
      background: var(--panel-2); border: 1px solid var(--border);
      padding: 12px 18px; border-radius: 12px; color: var(--text);
      box-shadow: 0 18px 50px rgba(0,0,0,0.5);
      opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s;
      max-width: 90vw;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }
    .toast.err { border-color: var(--err); }
    .toast.ok { border-color: var(--ok); }

    .spinner {
      width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.25);
      border-top-color: #fff;
      animation: spin .7s linear infinite;
      display: inline-block; vertical-align: -2px; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 640px) {
      form.start { grid-template-columns: 1fr; }
      .grid2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="logo">
        <div class="mark">V1</div>
        <div>
          <h1>Vende en One · Live Controller</h1>
          <p>Inicia y detiene listeners de TikTok Live conectados a Convex.</p>
        </div>
      </div>
    </header>

    <section class="card">
      <form class="start" id="startForm" autocomplete="off">
        <div>
          <label for="username">Usuario de TikTok</label>
          <input id="username" name="username" type="text" placeholder="ej. charlidamelio" spellcheck="false" required />
        </div>
        <div class="btn-row">
          <button type="submit" id="startBtn">Iniciar Live</button>
          <button type="button" class="secondary" id="stopBtn">Detener</button>
        </div>
      </form>
      <p class="hint">El username se envía a <code>POST /lives/start</code> a través del proxy local.</p>
    </section>

    <div class="grid2">
      <section class="section">
        <h2>Estado de la última acción</h2>
        <div class="status" id="status">
          <span class="dot" id="statusDot"></span>
          <span id="statusText">Sin actividad todavía.</span>
        </div>
      </section>

      <section class="section">
        <h2>Lives activos</h2>
        <div class="lives" id="livesList">
          <div class="empty">Cargando…</div>
        </div>
      </section>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API = "/api";
    const $ = (id) => document.getElementById(id);
    const fmt = (o) => JSON.stringify(o, null, 2);

    function toast(msg, kind = "ok") {
      const t = $("toast");
      t.textContent = msg;
      t.className = "toast show " + kind;
      clearTimeout(toast._t);
      toast._t = setTimeout(() => { t.className = "toast"; }, 3200);
    }

    function setStatus(text, kind = "") {
      $("statusText").innerHTML = text;
      const dot = $("statusDot");
      dot.className = "dot" + (kind ? " " + kind : "");
    }

    function setLoading(loading) {
      $("startBtn").disabled = loading;
      $("stopBtn").disabled = loading;
      if (loading) {
        $("startBtn").innerHTML = '<span class="spinner"></span>Iniciando…';
      } else {
        $("startBtn").textContent = "Iniciar Live";
      }
    }

    async function callStart(username) {
      setLoading(true);
      setStatus('<span class="spinner"></span>Enviando <code>POST /lives/start</code>…');
      try {
        const res = await fetch(`${API}/lives/start`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username }),
        });
        const data = await res.json().catch(() => ({ raw: "respuesta no-JSON" }));
        if (res.ok) {
          setStatus(`✓ Live iniciado para <b>@${username}</b><br><pre>${fmt(data)}</pre>`, "ok");
          toast(`Live iniciado: @${username}`, "ok");
        } else {
          setStatus(`✗ Error (${res.status})<br><pre>${fmt(data)}</pre>`, "err");
          toast(`Error al iniciar: ${data.message || res.status}`, "err");
        }
      } catch (err) {
        setStatus(`✗ Fallo de red:<br><pre>${fmt({ error: err.message })}</pre>`, "err");
        toast(`Fallo de red: ${err.message}`, "err");
      } finally {
        setLoading(false);
        refreshLives();
      }
    }

    async function callStop(username) {
      if (!username) { toast("Ingresa un username primero", "err"); return; }
      setLoading(true);
      setStatus('<span class="spinner"></span>Deteniendo…');
      try {
        const res = await fetch(`${API}/lives/stop`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username }),
        });
        const data = await res.json().catch(() => ({ raw: "respuesta no-JSON" }));
        if (res.ok) {
          setStatus(`✓ Detenido <b>@${username}</b><br><pre>${fmt(data)}</pre>`, "ok");
          toast(`Detenido: @${username}`, "ok");
        } else {
          setStatus(`✗ Error (${res.status})<br><pre>${fmt(data)}</pre>`, "err");
          toast(`Error al detener: ${data.message || res.status}`, "err");
        }
      } catch (err) {
        setStatus(`✗ Fallo de red:<br><pre>${fmt({ error: err.message })}</pre>`, "err");
      } finally {
        setLoading(false);
        refreshLives();
      }
    }

    async function refreshLives() {
      try {
        const res = await fetch(`${API}/lives`);
        const data = await res.json().catch(() => ({}));
        const list = $("livesList");
        const lives = Array.isArray(data.lives) ? data.lives : [];
        if (!lives.length) {
          list.innerHTML = '<div class="empty">No hay listeners activos.</div>';
          return;
        }
        list.innerHTML = lives.map((l) => {
          const name = (typeof l === "string" ? l : l.username) || "?";
          const initial = (name[0] || "?").toUpperCase();
          const sub = typeof l === "object" ? fmt(l) : `escuchando @${name}`;
          return `
            <div class="live-item">
              <div class="who">
                <div class="avatar">${initial}</div>
                <div>
                  <div class="name">@${name}</div>
                  <div class="sub">${sub.replace(/</g,"&lt;")}</div>
                </div>
              </div>
              <button class="secondary" data-stop="${name}">Detener</button>
            </div>`;
        }).join("");
        list.querySelectorAll("[data-stop]").forEach((b) => {
          b.addEventListener("click", () => callStop(b.getAttribute("data-stop")));
        });
      } catch {
        $("livesList").innerHTML = '<div class="empty">No se pudo cargar /lives.</div>';
      }
    }

    $("startForm").addEventListener("submit", (e) => {
      e.preventDefault();
      const username = $("username").value.trim().replace(/^@/, "");
      if (!username) return;
      callStart(username);
    });

    $("stopBtn").addEventListener("click", () => {
      const username = $("username").value.trim().replace(/^@/, "");
      callStop(username);
    });

    refreshLives();
    setInterval(refreshLives, 10000);
  </script>
</body>
</html>
